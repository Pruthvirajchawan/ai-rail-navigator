name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? Who is affected?
      placeholder: As a section controller, I struggle to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: dropdown
    id: scope
    attributes:
      label: Affected Area
      multiple: true
      options:
        - AI Engine
        - Scheduling Engine
        - Conflict Resolver
        - Track Visualization
        - Performance Charts
        - Alerts
        - Simulation Core
        - UI / UX
        - Documentation
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context / Mockups
